---
- name: Configure Egress Squid Proxies for New Destination
  hosts: all
#  become: true
  vars:
    # These variables can be overridden via AAP Surveys or Extra Vars
    target_domain: "abc123.com"
    target_prefix: "abc123"

  tasks:
    # -------------------------------------------------------------------------
    # TASK 1: Modify squid.conf
    # -------------------------------------------------------------------------
    - name: Task 1 - Add new URL ACL under the allowed internet websites section
      ansible.builtin.lineinfile:
        path: /etc/squid/squid.conf
        line: "acl allow_dst dstdomain .{{ target_domain }}"
        insertafter: '^#ALLOWED INTERNET WEBSITES ACL'
        state: present
      notify: Reload Squid Service

    # -------------------------------------------------------------------------
    # TASK 2: Update access-lists
    # -------------------------------------------------------------------------
    - name: Task 2 - Append include line to access-lists.conf
      ansible.builtin.lineinfile:
        path: /etc/squid/access-lists/access-lists.conf
        line: "include /etc/squid/access-lists/{{ target_domain }}"
        state: present
      notify: Reload Squid Service

    - name: Task 2 - Create the new destination configuration file
      ansible.builtin.file:
        path: "/etc/squid/access-lists/{{ target_prefix }}.conf"
        state: touch
        mode: '0644'
        owner: root
        group: root

    # -------------------------------------------------------------------------
    # TASK 3: Update groups/external files
    # -------------------------------------------------------------------------
    - name: Task 3 - Create domain file for new destination
      ansible.builtin.file:
        path: "/etc/squid/groups/external/{{ target_prefix }}.domain"
        state: touch
        mode: '0644'
        owner: root
        group: root

    - name: Task 3 - Create IP file for new destination
      ansible.builtin.file:
        path: "/etc/squid/groups/external/{{ target_prefix }}.ip"
        state: touch
        mode: '0644'
        owner: root
        group: root

  handlers:
    - name: Reload Squid Service
      ansible.builtin.service:
        name: squid
        state: reloaded
    
